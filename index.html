<!DOCTYPE html>
<html>
<head>
    <title>DineDelight Restaurant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fff3e6;
        }

        header {
            background: #ff6600;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>

</head>

<body>

<header>
    <h1>🍽️ DineDelight</h1>
    <p>Best Food • Best Taste • Best Experience</p>
</header>

<h2 style="text-align:center; margin-top:20px;">Our Menu</h2>

<div class="menu">

    <div class="card">
        <h3>Burger 🍔</h3>
        <button>Order Now</button>
    </div>

    <div class="card">
        <h3>Pizza 🍕</h3>
        <button>Order Now</button>
    </div>

    <div class="card">
        <h3>Pasta 🍝</h3>
        <button>Order Now</button>
    </div>

    <div class="card">
        <h3>Ice Cream 🍦</h3>
        <button>Order Now</button>
    </div>

</div>

<footer>
    <p>📧 info@dinedelight.com</p>
</footer>

</body>
</html>
